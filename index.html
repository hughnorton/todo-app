<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="To Do">
<meta name="theme-color" content="#4f46e5">
<title>To Do</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

<style>
  :root {
    --bg: #f4f4f8;
    --card: #ffffff;
    --text: #1c1c2e;
    --muted: #8a8aa0;
    --accent: #4f46e5;
    --accent-soft: #eef0ff;
    --danger: #dc2626;
    --warn-bg: #fff7e6;
    --warn-border: #f0c36d;
    --warn-text: #7a5c00;
    --line: #e7e7ef;
    --pTop: #dc2626;
    --pHigh: #ea770b;
    --pMid: #4f46e5;
    --pLow: #8a8aa0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101018;
      --card: #1c1c28;
      --text: #f0f0f6;
      --muted: #9a9ab0;
      --accent: #7c74ff;
      --accent-soft: #26263e;
      --danger: #f87171;
      --warn-bg: #2e2610;
      --warn-border: #6e5a1e;
      --warn-text: #e8c96a;
      --line: #2c2c3c;
      --pTop: #f87171;
      --pHigh: #fb923c;
      --pMid: #7c74ff;
      --pLow: #9a9ab0;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 110px);
    max-width: 560px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
  header h1 { font-size: 1.7rem; letter-spacing: -0.02em; }
  #dateLabel { color: var(--muted); font-size: 0.85rem; }

  #backupBanner {
    display: none;
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    color: var(--warn-text);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 0.9rem;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  #backupBanner.show { display: flex; }
  #backupBanner button {
    background: var(--warn-text);
    color: var(--warn-bg);
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.85rem;
    font-weight: 600;
    flex-shrink: 0;
  }

  .page { display: none; }
  .page.show { display: block; }

  /* ---------- shared bits ---------- */
  .prio {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 30px;
    height: 22px;
    border-radius: 7px;
    font-size: 0.75rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    padding: 0 5px;
  }
  .prio.pTop { background: var(--pTop); }
  .prio.pHigh { background: var(--pHigh); }
  .prio.pMid { background: var(--pMid); }
  .prio.pLow { background: var(--pLow); }

  .chip {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--muted);
    border-radius: 999px;
    padding: 6px 13px;
    font-size: 0.84rem;
    font-weight: 600;
  }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chipRow { display: flex; flex-wrap: wrap; gap: 7px; }

  .tagList { display: flex; flex-wrap: wrap; gap: 5px; }
  .tagList span {
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 6px;
    padding: 1px 7px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .subNote { color: var(--muted); font-size: 0.75rem; }

  .seg { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .seg button {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--muted);
    border-radius: 9px;
    padding: 8px 0;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .seg button.on { background: var(--accent); border-color: var(--accent); color: #fff; }

  .fieldLabel { display: block; color: var(--muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin: 14px 0 6px; }
  .txtInput, .dateInput, .txtArea {
    width: 100%;
    font-size: 1rem;
    padding: 11px 13px;
    border: 1px solid var(--line);
    border-radius: 11px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    font-family: inherit;
    min-height: 44px;
    -webkit-appearance: none;
  }
  .txtInput:focus, .dateInput:focus, .txtArea:focus { border-color: var(--accent); }
  .txtArea { min-height: 90px; resize: vertical; }
  .dateHintRow { display: flex; align-items: center; gap: 8px; }
  .dateHintRow .dateInput { flex: 1; }
  .clearDateBtn { background: none; border: 1px solid var(--line); color: var(--muted); border-radius: 9px; padding: 9px 12px; font-size: 0.85rem; flex-shrink: 0; }

  /* ---------- current page ---------- */
  #currentCard {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px 18px;
    margin-top: 6px;
  }
  #currentCard .topRow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  #currentName { font-size: 1.35rem; font-weight: 650; line-height: 1.3; word-break: break-word; margin-bottom: 8px; background: none; border: none; color: var(--text); text-align: left; padding: 0; }
  #currentDetails { color: var(--muted); font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; margin: 10px 0 2px; }
  #currentBtns { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 18px; }
  #currentBtns button {
    border: none;
    border-radius: 12px;
    padding: 14px 0;
    font-size: 0.95rem;
    font-weight: 650;
    background: var(--accent-soft);
    color: var(--accent);
  }
  #currentBtns #curDone { grid-column: 1 / -1; background: var(--accent); color: #fff; padding: 15px 0; font-size: 1.05rem; }
  #currentBtns #curReduce { grid-column: 1 / -1; background: var(--bg); border: 1px solid var(--line); color: var(--muted); }
  #currentEmpty { text-align: center; color: var(--muted); padding: 46px 10px; font-size: 0.95rem; line-height: 1.6; }
  #backupBtns { display: none; margin-top: 18px; }
  #backupBtns.show { display: block; }
  #backupNowBtn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px 0;
    font-size: 1.05rem;
    font-weight: 650;
  }

  /* ---------- add page ---------- */
  #addBox { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; }
  #addBox .fieldLabel:first-child { margin-top: 0; }
  #addSubmit {
    width: 100%;
    margin-top: 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px 0;
    font-size: 1.05rem;
    font-weight: 650;
  }

  /* ---------- list page ---------- */
  #filterRow { margin-bottom: 12px; }

  ul { list-style: none; }
  li.item {
    display: flex;
    align-items: center;
    gap: 11px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 13px;
    margin-bottom: 8px;
  }
  li.item .check {
    width: 26px; height: 26px;
    border: 2px solid var(--muted);
    border-radius: 50%;
    background: none;
    flex-shrink: 0;
    color: transparent;
    font-size: 15px;
    line-height: 1;
  }
  li.item.done .check { background: var(--accent); border-color: var(--accent); color: #fff; }
  li.item .mid { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  li.item .name { font-size: 1rem; word-break: break-word; text-align: left; background: none; border: none; color: var(--text); padding: 0; }
  li.item.done .name { color: var(--muted); text-decoration: line-through; }
  li.item.snoozed { opacity: 0.62; }
  #emptyMsg { color: var(--muted); text-align: center; padding: 30px 0; font-size: 0.95rem; }

  #doneHeader {
    display: none;
    width: 100%;
    background: none; border: none;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 600;
    text-align: left;
    padding: 14px 4px 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  #doneHeader.show { display: block; }
  #doneList.collapsed { display: none; }
  #clearDoneBtn { display: none; margin: 4px auto 0; background: none; border: none; color: var(--muted); font-size: 0.85rem; text-decoration: underline; padding: 6px; }
  #clearDoneBtn.show { display: block; }

  #toolsToggle {
    display: block;
    margin: 26px auto 0;
    background: none; border: none;
    color: var(--muted);
    font-size: 0.9rem;
    text-decoration: underline;
    padding: 8px;
  }
  #tools { display: none; margin-top: 10px; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
  #tools.show { display: block; }
  #tools h2 { font-size: 1rem; margin-bottom: 4px; }
  #tools p.hint { color: var(--muted); font-size: 0.82rem; margin-bottom: 10px; }
  #tools .btnRow { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  button.action {
    background: var(--accent-soft);
    color: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 0.9rem;
    font-weight: 600;
  }
  #restoreText {
    width: 100%;
    min-height: 70px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.8rem;
    font-family: ui-monospace, Menlo, monospace;
    padding: 8px;
    margin-bottom: 8px;
  }

  /* ---------- detail sheet ---------- */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 40;
  }
  #overlay.show { display: flex; }
  #detailSheet {
    background: var(--card);
    width: 100%;
    max-width: 560px;
    max-height: 88vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 20px 20px 0 0;
    padding: 18px 18px calc(env(safe-area-inset-bottom) + 18px);
  }
  #detailSheet .sheetHead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  #detailSheet .sheetHead h2 { font-size: 1.15rem; }
  #closeSheet { background: none; border: none; color: var(--muted); font-size: 1.5rem; padding: 2px 8px; }
  #dSnoozeRow, #dDoneRow { display: none; align-items: center; justify-content: space-between; gap: 10px; margin-top: 14px; background: var(--bg); border: 1px solid var(--line); border-radius: 11px; padding: 10px 12px; font-size: 0.85rem; color: var(--muted); }
  #dSnoozeRow.show, #dDoneRow.show { display: flex; }
  #dMeta { color: var(--muted); font-size: 0.78rem; margin-top: 14px; }
  #sheetBtns { display: flex; gap: 9px; margin-top: 18px; }
  #dSave { flex: 1; background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 14px 0; font-size: 1rem; font-weight: 650; }
  #dDelete { background: none; border: 1px solid var(--line); color: var(--danger); border-radius: 12px; padding: 14px 18px; font-size: 0.95rem; font-weight: 600; }

  /* ---------- tab bar ---------- */
  #tabbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--line);
    display: flex;
    padding: 6px 0 calc(env(safe-area-inset-bottom) + 6px);
    z-index: 30;
  }
  #tabbar button {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 650;
    padding: 7px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  #tabbar button .ico { font-size: 1.25rem; line-height: 1; }
  #tabbar button.on { color: var(--accent); }

  #toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 88px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg);
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 0.9rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    max-width: 90%;
    text-align: center;
    z-index: 50;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1 id="pageTitle">Current</h1>
  <span id="dateLabel"></span>
</header>

<div id="backupBanner">
  <span id="backupBannerMsg"></span>
  <button id="bannerBackupBtn">Back up</button>
</div>

<!-- ================= CURRENT PAGE ================= -->
<div id="page-current" class="page">
  <div id="currentCard">
    <div class="topRow">
      <span class="prio" id="currentPrio"></span>
      <div class="tagList" id="currentTags"></div>
    </div>
    <button id="currentName"></button>
    <div id="currentDetails"></div>
    <div id="currentBtns">
      <button id="curDone">✓ Done</button>
      <button id="cur1h">1 Hour</button>
      <button id="cur1d">1 Day</button>
      <button id="cur1w">1 Week</button>
      <button id="cur1m">1 Month</button>
      <button id="curReduce">Reduce Priority</button>
    </div>
    <div id="backupBtns">
      <button id="backupNowBtn">✉ Email backup</button>
    </div>
  </div>
  <div id="currentEmpty" hidden></div>
</div>

<!-- ================= LIST PAGE ================= -->
<div id="page-list" class="page">
  <div class="chipRow" id="filterRow"></div>

  <ul id="activeList"></ul>
  <p id="emptyMsg" hidden></p>
  <button id="doneHeader">Completed (<span id="doneCount">0</span>) — tap to show/hide</button>
  <ul id="doneList" class="collapsed"></ul>
  <button id="clearDoneBtn">Clear completed</button>

  <button id="toolsToggle">Backup &amp; restore</button>
  <div id="tools">
    <h2>Back up</h2>
    <p class="hint" id="backupStatus"></p>
    <div class="btnRow">
      <button class="action" id="emailBackupBtn">Email backup</button>
      <button class="action" id="downloadBackupBtn">Save as file</button>
    </div>
    <h2>Restore</h2>
    <p class="hint">Paste the backup text from your email (or choose a backup file), then tap Restore. This replaces the current list.</p>
    <textarea id="restoreText" placeholder='Paste backup here, e.g. {"app":"todo", ...}'></textarea>
    <div class="btnRow">
      <button class="action" id="restoreBtn">Restore from pasted text</button>
      <button class="action" id="restoreFileBtn">Choose backup file…</button>
      <input id="restoreFile" type="file" accept=".json,.txt,application/json,text/plain" hidden>
    </div>
  </div>
</div>

<!-- ================= ADD TASK PAGE ================= -->
<div id="page-add" class="page">
  <div id="addBox">
    <label class="fieldLabel" for="newItem">Name</label>
    <input id="newItem" class="txtInput" type="text" placeholder="What needs doing?" autocomplete="off">
    <label class="fieldLabel" for="newDetails">Details</label>
    <textarea id="newDetails" class="txtArea" placeholder="Notes, links, anything…"></textarea>
    <label class="fieldLabel">Priority (10 = highest)</label>
    <div class="seg" id="addPrio"></div>
    <label class="fieldLabel" for="newP10">Priority 10 date — optional: task jumps to P10 on this day</label>
    <div class="dateHintRow">
      <input id="newP10" class="dateInput" type="date">
      <button class="clearDateBtn" id="newP10Clear">Clear</button>
    </div>
    <label class="fieldLabel">Tags</label>
    <div class="chipRow" id="addTags"></div>
    <button id="addSubmit">Add Task</button>
  </div>
</div>

<!-- ================= DETAIL SHEET ================= -->
<div id="overlay">
  <div id="detailSheet">
    <div class="sheetHead">
      <h2>Task details</h2>
      <button id="closeSheet" aria-label="Close">✕</button>
    </div>
    <label class="fieldLabel" for="dName">Name</label>
    <input id="dName" class="txtInput" type="text" autocomplete="off">
    <label class="fieldLabel">Priority (10 = highest)</label>
    <div class="seg" id="dPrio"></div>
    <label class="fieldLabel" for="dP10">Priority 10 date — optional: task jumps to P10 on this day</label>
    <div class="dateHintRow">
      <input id="dP10" class="dateInput" type="date">
      <button class="clearDateBtn" id="dP10Clear">Clear</button>
    </div>
    <label class="fieldLabel">Tags</label>
    <div class="chipRow" id="dTags"></div>
    <label class="fieldLabel" for="dDetails">Details</label>
    <textarea id="dDetails" class="txtArea" placeholder="Notes, links, anything…"></textarea>
    <div id="dSnoozeRow">
      <span id="dSnoozeMsg"></span>
      <button class="action" id="dUnsnooze">Un-snooze</button>
    </div>
    <div id="dDoneRow">
      <span id="dDoneMsg"></span>
      <button class="action" id="dUncomplete">Mark Uncomplete</button>
    </div>
    <div id="dMeta"></div>
    <div id="sheetBtns">
      <button id="dSave">Save</button>
      <button id="dDelete">Delete</button>
    </div>
  </div>
</div>

<!-- ================= TAB BAR ================= -->
<div id="tabbar">
  <button id="tabCurrent"><span class="ico">◎</span>Current</button>
  <button id="tabList"><span class="ico">☰</span>List</button>
  <button id="tabAdd"><span class="ico">＋</span>Add Task</button>
</div>

<div id="toast"></div>

<script>
"use strict";

const STORE_KEY = "todo.v1";
const BACKUP_REMIND_MS = 48 * 60 * 60 * 1000; // remind when the last backup is older than 2 days
const BACKUP_EMAIL = "hughnorton7@gmail.com";
const TAGS = ["Admin", "Reading", "Watching"];
const HOUR = 3600 * 1000, DAY = 24 * HOUR, WEEK = 7 * DAY, MONTH = 30 * DAY;

let state = load();
let activeTab = "current";
let filterTag = null;        // null = all
let addPriority = 5;
let addTagSel = new Set();
let editingId = null;
let editPriority = 5;
let editTagSel = new Set();

function normalizeItem(i) {
  return {
    id: typeof i.id === "string" ? i.id : uid(),
    name: typeof i.name === "string" ? i.name : (typeof i.text === "string" ? i.text : ""),
    details: typeof i.details === "string" ? i.details : "",
    priority: Number.isInteger(i.priority) && i.priority >= 1 && i.priority <= 10 ? i.priority : 5,
    p10Date: (typeof i.p10Date === "string" && /^\d{4}-\d{2}-\d{2}$/.test(i.p10Date)) ? i.p10Date : null,
    tags: Array.isArray(i.tags) ? i.tags.filter(t => typeof t === "string") : [],
    done: !!i.done,
    createdAt: i.createdAt || Date.now(),
    completedAt: i.completedAt || null,
    snoozeUntil: typeof i.snoozeUntil === "number" ? i.snoozeUntil : null,
  };
}

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (Array.isArray(s.items)) {
        s.items = s.items.map(normalizeItem);
        return s;
      }
    }
  } catch (e) { /* fall through to fresh state */ }
  return { items: [], lastBackupAt: null, dirtySince: null };
}

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function markDirty() {
  if (!state.dirtySince) state.dirtySince = Date.now();
  save();
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function isSnoozed(item) {
  return item.snoozeUntil && item.snoozeUntil > Date.now();
}

function p10Reached(item) {
  return item.p10Date && new Date(item.p10Date + "T00:00") <= new Date();
}

// The priority the task counts as right now (escalates to 10 once its P10 date arrives).
function effPrio(item) {
  return p10Reached(item) ? 10 : item.priority;
}

function byId(id) {
  return state.items.find(i => i.id === id);
}

// Backup is due when there are unbacked-up changes and the last backup is over 48h old (or never happened).
function backupOverdue() {
  return state.items.length > 0 && !!state.dirtySince &&
    (!state.lastBackupAt || Date.now() - state.lastBackupAt > BACKUP_REMIND_MS);
}

// ---------- shared widgets ----------

function prioClass(p) {
  if (p >= 9) return "pTop";
  if (p >= 7) return "pHigh";
  if (p >= 4) return "pMid";
  return "pLow";
}

function buildPrioPicker(container, getSel, setSel) {
  container.innerHTML = "";
  for (let p = 1; p <= 10; p++) {
    const b = document.createElement("button");
    b.type = "button";
    b.textContent = p;
    b.classList.toggle("on", getSel() === p);
    b.onclick = () => { setSel(p); buildPrioPicker(container, getSel, setSel); };
    container.appendChild(b);
  }
}

function buildTagChips(container, selSet) {
  container.innerHTML = "";
  for (const tag of TAGS) {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "chip" + (selSet.has(tag) ? " on" : "");
    b.textContent = tag;
    b.onclick = () => {
      if (selSet.has(tag)) selSet.delete(tag); else selSet.add(tag);
      buildTagChips(container, selSet);
    };
    container.appendChild(b);
  }
}

function tagListEl(tags) {
  const wrap = document.createElement("div");
  wrap.className = "tagList";
  for (const t of tags) {
    const s = document.createElement("span");
    s.textContent = t;
    wrap.appendChild(s);
  }
  return wrap;
}

function fmtWhen(ts) {
  const d = new Date(ts);
  const sameDay = new Date().toDateString() === d.toDateString();
  return sameDay
    ? d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" })
    : d.toLocaleString(undefined, { weekday: "short", day: "numeric", month: "short", hour: "numeric", minute: "2-digit" });
}

function fmtDateStr(dateStr) {
  return new Date(dateStr + "T00:00").toLocaleDateString(undefined, { weekday: "short", day: "numeric", month: "short" });
}

// ---------- current page ----------

function pickCurrent() {
  const eligible = state.items.filter(i => !i.done && !isSnoozed(i));
  eligible.sort((a, b) => (effPrio(b) - effPrio(a)) || (a.createdAt - b.createdAt));
  return eligible[0] || null;
}

function renderCurrent() {
  const card = document.getElementById("currentCard");
  const empty = document.getElementById("currentEmpty");
  const taskBtns = document.getElementById("currentBtns");
  const backupBtns = document.getElementById("backupBtns");

  if (backupOverdue()) {
    card.style.display = "block";
    empty.hidden = true;
    taskBtns.style.display = "none";
    backupBtns.classList.add("show");
    const prio = document.getElementById("currentPrio");
    prio.className = "prio pTop";
    prio.textContent = "⚠";
    document.getElementById("currentTags").innerHTML = "";
    const nameBtn = document.getElementById("currentName");
    nameBtn.textContent = "Backup To Do List";
    nameBtn.onclick = null;
    const det = document.getElementById("currentDetails");
    det.textContent = state.lastBackupAt
      ? "Last backup was " + new Date(state.lastBackupAt).toLocaleString() + " and you've made changes since. Email yourself a fresh backup to get back to your tasks."
      : "You've never backed up. Email yourself a backup to get back to your tasks.";
    det.style.display = "block";
    document.getElementById("backupNowBtn").onclick = emailBackup;
    return;
  }
  taskBtns.style.display = "";
  backupBtns.classList.remove("show");

  const item = pickCurrent();

  if (!item) {
    card.style.display = "none";
    empty.hidden = false;
    const snoozed = state.items.filter(i => !i.done && isSnoozed(i));
    if (snoozed.length > 0) {
      const next = Math.min(...snoozed.map(i => i.snoozeUntil));
      empty.textContent = "All clear for now 🎉 " + snoozed.length + " snoozed task" +
        (snoozed.length > 1 ? "s" : "") + " — next back at " + fmtWhen(next) + ".";
    } else {
      empty.textContent = "Nothing to do 🎉 Add tasks on the Add Task page.";
    }
    return;
  }

  card.style.display = "block";
  empty.hidden = true;
  const prio = document.getElementById("currentPrio");
  const p = effPrio(item);
  prio.className = "prio " + prioClass(p);
  prio.textContent = "P" + p + (p10Reached(item) && item.priority !== 10 ? " ⚡" : "");
  const tags = document.getElementById("currentTags");
  tags.innerHTML = "";
  tags.append(...tagListEl(item.tags).children);
  const nameBtn = document.getElementById("currentName");
  nameBtn.textContent = item.name;
  nameBtn.onclick = () => openDetail(item.id);
  const det = document.getElementById("currentDetails");
  det.textContent = item.details;
  det.style.display = item.details ? "block" : "none";

  document.getElementById("curDone").onclick = () => { completeItem(item.id); };
  document.getElementById("cur1h").onclick = () => snooze(item.id, HOUR, "1 hour");
  document.getElementById("cur1d").onclick = () => snooze(item.id, DAY, "1 day");
  document.getElementById("cur1w").onclick = () => snooze(item.id, WEEK, "1 week");
  document.getElementById("cur1m").onclick = () => snooze(item.id, MONTH, "1 month");
  document.getElementById("curReduce").onclick = () => reducePriority(item.id);
}

function completeItem(id) {
  const item = byId(id);
  if (!item) return;
  item.done = true;
  item.completedAt = Date.now();
  markDirty();
  render();
  toast("Done: " + item.name);
}

function snooze(id, ms, label) {
  const item = byId(id);
  if (!item) return;
  item.snoozeUntil = Date.now() + ms;
  markDirty();
  render();
  toast("Snoozed for " + label + " — back at " + fmtWhen(item.snoozeUntil));
}

function reducePriority(id) {
  const item = byId(id);
  if (!item) return;
  if (p10Reached(item)) {
    // Escalated by its P10 date: drop it to 9 and clear the date, otherwise it would stay pinned at 10.
    item.priority = 9;
    item.p10Date = null;
    markDirty();
    render();
    toast("P10 date cleared — priority now 9.");
    return;
  }
  if (item.priority <= 1) {
    toast("Already at lowest priority (1).");
    return;
  }
  item.priority -= 1;
  markDirty();
  render();
  toast("Priority lowered to P" + item.priority);
}

// ---------- list page ----------

const activeList = document.getElementById("activeList");
const doneList = document.getElementById("doneList");

function renderList() {
  buildFilterChips();
  activeList.innerHTML = "";
  doneList.innerHTML = "";

  const matches = i => !filterTag || i.tags.includes(filterTag);
  const active = state.items.filter(i => !i.done && matches(i));
  const done = state.items.filter(i => i.done && matches(i));
  active.sort((a, b) => (effPrio(b) - effPrio(a)) || (a.createdAt - b.createdAt));
  done.sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

  for (const item of active) activeList.appendChild(renderItem(item));
  for (const item of done) doneList.appendChild(renderItem(item));

  const emptyMsg = document.getElementById("emptyMsg");
  emptyMsg.hidden = active.length > 0;
  emptyMsg.textContent = filterTag
    ? "No active “" + filterTag + "” tasks."
    : "Nothing to do — add tasks on the Add Task page.";
  document.getElementById("doneCount").textContent = done.length;
  document.getElementById("doneHeader").classList.toggle("show", done.length > 0);
  document.getElementById("clearDoneBtn").classList.toggle("show",
    done.length > 0 && !doneList.classList.contains("collapsed"));
}

function buildFilterChips() {
  const row = document.getElementById("filterRow");
  row.innerHTML = "";
  const all = document.createElement("button");
  all.className = "chip" + (filterTag === null ? " on" : "");
  all.textContent = "All";
  all.onclick = () => { filterTag = null; renderList(); };
  row.appendChild(all);
  for (const tag of TAGS) {
    const b = document.createElement("button");
    b.className = "chip" + (filterTag === tag ? " on" : "");
    b.textContent = tag;
    b.onclick = () => { filterTag = (filterTag === tag ? null : tag); renderList(); };
    row.appendChild(b);
  }
}

function renderItem(item) {
  const li = document.createElement("li");
  li.className = "item" + (item.done ? " done" : "") + (isSnoozed(item) ? " snoozed" : "");

  const check = document.createElement("button");
  check.className = "check";
  check.setAttribute("aria-label", item.done ? "Mark as not done" : "Mark as done");
  check.textContent = "✓";
  check.onclick = () => toggle(item.id);

  const mid = document.createElement("div");
  mid.className = "mid";
  const name = document.createElement("button");
  name.className = "name";
  name.textContent = item.name;
  name.onclick = () => openDetail(item.id);
  mid.appendChild(name);
  if (item.tags.length > 0) mid.appendChild(tagListEl(item.tags));
  if (!item.done && isSnoozed(item)) {
    const sn = document.createElement("span");
    sn.className = "subNote";
    sn.textContent = "⏸ snoozed until " + fmtWhen(item.snoozeUntil);
    mid.appendChild(sn);
  }
  if (!item.done && item.p10Date && !p10Reached(item)) {
    const up = document.createElement("span");
    up.className = "subNote";
    up.textContent = "⚡ becomes P10 on " + fmtDateStr(item.p10Date);
    mid.appendChild(up);
  }

  const p = effPrio(item);
  const prio = document.createElement("span");
  prio.className = "prio " + prioClass(p);
  prio.textContent = "P" + p + (!item.done && p10Reached(item) && item.priority !== 10 ? " ⚡" : "");

  li.append(check, mid, prio);
  return li;
}

function toggle(id) {
  const item = byId(id);
  if (!item) return;
  item.done = !item.done;
  item.completedAt = item.done ? Date.now() : null;
  markDirty();
  render();
}

// ---------- add page ----------

function addItem() {
  const nameInput = document.getElementById("newItem");
  const name = nameInput.value.trim();
  if (!name) { toast("Give the task a name first."); return; }
  const p10 = document.getElementById("newP10").value || null;
  state.items.push({
    id: uid(), name,
    details: document.getElementById("newDetails").value.trim(),
    priority: addPriority, p10Date: p10, tags: [...addTagSel],
    done: false, createdAt: Date.now(), completedAt: null, snoozeUntil: null,
  });
  nameInput.value = "";
  document.getElementById("newDetails").value = "";
  document.getElementById("newP10").value = "";
  addPriority = 5;
  addTagSel.clear();
  buildPrioPicker(document.getElementById("addPrio"), () => addPriority, p => { addPriority = p; });
  buildTagChips(document.getElementById("addTags"), addTagSel);
  markDirty();
  render();
  toast("Added: " + name);
  nameInput.focus();
}

// ---------- detail sheet ----------

function openDetail(id) {
  const item = byId(id);
  if (!item) return;
  editingId = id;
  editPriority = item.priority;
  editTagSel = new Set(item.tags);

  document.getElementById("dName").value = item.name;
  document.getElementById("dDetails").value = item.details;
  document.getElementById("dP10").value = item.p10Date || "";
  buildPrioPicker(document.getElementById("dPrio"), () => editPriority, p => { editPriority = p; });
  buildTagChips(document.getElementById("dTags"), editTagSel);

  const snRow = document.getElementById("dSnoozeRow");
  if (!item.done && isSnoozed(item)) {
    document.getElementById("dSnoozeMsg").textContent = "Snoozed until " + fmtWhen(item.snoozeUntil);
    snRow.classList.add("show");
  } else {
    snRow.classList.remove("show");
  }

  const doneRow = document.getElementById("dDoneRow");
  if (item.done) {
    document.getElementById("dDoneMsg").textContent = "Completed " +
      (item.completedAt ? new Date(item.completedAt).toLocaleDateString() : "");
    doneRow.classList.add("show");
  } else {
    doneRow.classList.remove("show");
  }

  document.getElementById("dMeta").textContent = "Created " + new Date(item.createdAt).toLocaleDateString();
  document.getElementById("overlay").classList.add("show");
}

function closeDetail() {
  editingId = null;
  document.getElementById("overlay").classList.remove("show");
}

function saveDetail() {
  const item = byId(editingId);
  if (!item) { closeDetail(); return; }
  const name = document.getElementById("dName").value.trim();
  if (!name) { toast("Name can't be empty."); return; }
  item.name = name;
  item.details = document.getElementById("dDetails").value.trim();
  item.priority = editPriority;
  item.p10Date = document.getElementById("dP10").value || null;
  item.tags = [...editTagSel];
  markDirty();
  closeDetail();
  render();
  toast("Saved.");
}

function deleteDetail() {
  const item = byId(editingId);
  if (!item) { closeDetail(); return; }
  if (!confirm("Delete “" + item.name + "”?")) return;
  state.items = state.items.filter(i => i.id !== editingId);
  markDirty();
  closeDetail();
  render();
  toast("Deleted.");
}

// ---------- backup / restore ----------

function backupPayload() {
  return JSON.stringify({ app: "todo", version: 3, exportedAt: new Date().toISOString(), items: state.items });
}

function backupDone() {
  state.lastBackupAt = Date.now();
  state.dirtySince = null;
  save();
  render();
}

async function emailBackup() {
  const json = backupPayload();
  const dateStr = new Date().toISOString().slice(0, 10);
  const file = new File([json], "todo-backup-" + dateStr + ".json", { type: "application/json" });

  // Preferred: iOS share sheet with the backup attached as a JSON file — pick Mail there.
  // (The share sheet can't pre-fill a recipient; the attachment is worth that trade-off.)
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: "To-Do backup " + dateStr });
      backupDone();
      toast("Backup shared — send it to " + BACKUP_EMAIL + " to finish.");
    } catch (e) { /* user cancelled the share sheet; not backed up */ }
    return;
  }

  // Fallback for browsers without file sharing: email with the backup as text in the body.
  const subject = encodeURIComponent("To-Do backup " + dateStr);
  const body = encodeURIComponent("Keep this email. To restore, copy everything between the lines into the app's Restore box.\n\n-----\n" + json + "\n-----\n");
  location.href = "mailto:" + BACKUP_EMAIL + "?subject=" + subject + "&body=" + body;
  backupDone();
  toast("Backup email opened — remember to hit send.");
}

function downloadBackup() {
  const blob = new Blob([backupPayload()], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "todo-backup-" + new Date().toISOString().slice(0, 10) + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
  backupDone();
  toast("Backup file saved.");
}

function restoreFromText(text) {
  let parsed;
  // Accept either raw JSON or an email body with the JSON between ----- lines.
  const fenced = text.match(/-----\s*([\s\S]*?)\s*-----/);
  const candidate = (fenced ? fenced[1] : text).trim();
  try {
    parsed = JSON.parse(candidate);
  } catch (e) {
    toast("That doesn't look like a valid backup.");
    return;
  }
  const items = Array.isArray(parsed) ? parsed : parsed.items;
  if (!Array.isArray(items) || !items.every(i => i && (typeof i.name === "string" || typeof i.text === "string"))) {
    toast("That doesn't look like a valid backup.");
    return;
  }
  const ok = confirm("Replace your current list (" + state.items.length + " items) with the backup (" + items.length + " items)?");
  if (!ok) return;
  state.items = items.map(normalizeItem);
  markDirty();
  render();
  document.getElementById("restoreText").value = "";
  toast("Restored " + items.length + " items.");
}

// ---------- backup reminder ----------

function renderBackupInfo() {
  const status = document.getElementById("backupStatus");
  if (state.lastBackupAt) {
    status.textContent = "Last backup: " + new Date(state.lastBackupAt).toLocaleString();
  } else {
    status.textContent = "Never backed up yet.";
  }

  const banner = document.getElementById("backupBanner");
  // The Current tab shows the backup pseudo-task instead, so no banner there.
  const showBanner = backupOverdue() && activeTab !== "current";
  if (showBanner) {
    document.getElementById("backupBannerMsg").textContent = state.lastBackupAt
      ? "Last backup was " + Math.floor((Date.now() - state.lastBackupAt) / DAY) + "+ days ago and you have new changes."
      : "You haven't backed up yet.";
  }
  banner.classList.toggle("show", showBanner);
}

// ---------- tabs / render ----------

const TAB_TITLES = { current: "Current", list: "List", add: "Add Task" };

function setTab(tab) {
  activeTab = tab;
  for (const t of ["current", "list", "add"]) {
    document.getElementById("page-" + t).classList.toggle("show", t === tab);
  }
  document.getElementById("tabCurrent").classList.toggle("on", tab === "current");
  document.getElementById("tabList").classList.toggle("on", tab === "list");
  document.getElementById("tabAdd").classList.toggle("on", tab === "add");
  document.getElementById("pageTitle").textContent = TAB_TITLES[tab];
  render();
}

function render() {
  if (activeTab === "current") renderCurrent();
  if (activeTab === "list") renderList();
  renderBackupInfo();
}

// ---------- misc ----------

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3000);
}

// ---------- wire up ----------

document.getElementById("addSubmit").onclick = addItem;
buildPrioPicker(document.getElementById("addPrio"), () => addPriority, p => { addPriority = p; });
buildTagChips(document.getElementById("addTags"), addTagSel);
document.getElementById("newP10Clear").onclick = () => { document.getElementById("newP10").value = ""; };
document.getElementById("dP10Clear").onclick = () => { document.getElementById("dP10").value = ""; };

document.getElementById("doneHeader").onclick = () => { doneList.classList.toggle("collapsed"); renderList(); };
document.getElementById("clearDoneBtn").onclick = () => {
  const done = state.items.filter(i => i.done);
  if (done.length === 0) return;
  if (!confirm("Delete all " + done.length + " completed tasks?")) return;
  state.items = state.items.filter(i => !i.done);
  markDirty();
  render();
};
document.getElementById("toolsToggle").onclick = () => {
  const tools = document.getElementById("tools");
  tools.classList.toggle("show");
  if (tools.classList.contains("show")) {
    setTimeout(() => tools.scrollIntoView({ behavior: "smooth", block: "start" }), 60);
  }
};
document.getElementById("emailBackupBtn").onclick = emailBackup;
document.getElementById("bannerBackupBtn").onclick = emailBackup;
document.getElementById("downloadBackupBtn").onclick = downloadBackup;
document.getElementById("restoreBtn").onclick = () => restoreFromText(document.getElementById("restoreText").value);
document.getElementById("restoreFileBtn").onclick = () => document.getElementById("restoreFile").click();
document.getElementById("restoreFile").addEventListener("change", e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => restoreFromText(String(reader.result));
  reader.readAsText(f);
  e.target.value = "";
});

document.getElementById("tabCurrent").onclick = () => setTab("current");
document.getElementById("tabList").onclick = () => setTab("list");
document.getElementById("tabAdd").onclick = () => setTab("add");
document.getElementById("closeSheet").onclick = closeDetail;
document.getElementById("overlay").addEventListener("click", e => { if (e.target === e.currentTarget) closeDetail(); });
document.getElementById("dSave").onclick = saveDetail;
document.getElementById("dDelete").onclick = deleteDetail;
document.getElementById("dUnsnooze").onclick = () => {
  const item = byId(editingId);
  if (!item) return;
  item.snoozeUntil = null;
  markDirty();
  document.getElementById("dSnoozeRow").classList.remove("show");
  render();
  toast("Snooze removed.");
};
document.getElementById("dUncomplete").onclick = () => {
  const item = byId(editingId);
  if (!item) return;
  item.done = false;
  item.completedAt = null;
  markDirty();
  closeDetail();
  render();
  toast("Moved back to your list.");
};

document.getElementById("dateLabel").textContent =
  new Date().toLocaleDateString(undefined, { weekday: "short", day: "numeric", month: "short" });

// Re-check snoozes and P10 dates when the app comes back to the foreground, and once a minute.
document.addEventListener("visibilitychange", () => { if (!document.hidden) render(); });
setInterval(render, 60 * 1000);

setTab("current");

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
